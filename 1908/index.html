<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Viewer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            width: 100%;
            height: 100%;
        }
        /* Container wraps the image and allows full natural scrolling when zoomed */
        #viewer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            padding: 40px;
            overflow: auto;
        }
        img {
            /* Changed to standard percentages so browser zoom multiplies its scale */
            width: auto;
            max-width: 95%;
            height: auto;
            display: block;
            margin: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        /* Buttons remain fixed to the screen edges even when scrolling zoomed images */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 20px 15px;
            cursor: pointer;
            font-size: 24px;
            transition: background 0.2s;
            user-select: none;
            z-index: 10;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        #left-btn { left: 20px; }
        #right-btn { right: 20px; }
        
        #page-counter {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            background: rgba(17,17,17,0.8);
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="viewer-container">
    <img id="slide-display" src="" alt="Slide">
</div>

<button id="left-btn" class="nav-btn">&#10094;</button>
<button id="right-btn" class="nav-btn">&#10095;</button>

<div id="page-counter">Slide <span id="current-page">1</span> of <span id="total-pages">0</span></div>

<script>
    const files = ["little-nemo-19080105-l.jpeg","little-nemo-19080112-l.jpeg","little-nemo-19080119-l.jpeg","little-nemo-19080126-l.jpeg","little-nemo-19080202-l.jpeg","little-nemo-19080209-l.jpeg","little-nemo-19080216-l.jpeg","little-nemo-19080223-l.jpeg","little-nemo-19080301-l.jpeg","little-nemo-19080308-l.jpeg","little-nemo-19080315-l.jpeg","little-nemo-19080322-l.jpeg","little-nemo-19080329-l.jpeg","little-nemo-19080405-l.jpeg","little-nemo-19080412-l.jpeg","little-nemo-19080419-l.jpeg","little-nemo-19080426-l.jpeg","little-nemo-19080503-l.jpeg","little-nemo-19080510-l.jpeg","little-nemo-19080517-l.jpeg","little-nemo-19080524-l.jpeg","little-nemo-19080531-l.jpeg","little-nemo-19080607-l.jpeg","little-nemo-19080614-l.jpeg","little-nemo-19080621-l.jpeg","little-nemo-19080628-l.jpeg","little-nemo-19080705-l.jpeg","little-nemo-19080712-l.jpeg","little-nemo-19080719-l.jpeg","little-nemo-19080726-l.jpeg","little-nemo-19080802-l.jpeg","little-nemo-19080809-l.jpeg","little-nemo-19080816-l.jpeg","little-nemo-19080823-l.jpeg","little-nemo-19080830-l.jpeg","little-nemo-19080906-l.jpeg","little-nemo-19080913-l.jpeg","little-nemo-19080920-l.jpeg","little-nemo-19080927-l.jpeg","little-nemo-19081004-l.jpeg","little-nemo-19081011-l.jpeg","little-nemo-19081018-l.jpeg","little-nemo-19081025-l.jpeg","little-nemo-19081101-l.jpeg","little-nemo-19081108-l.jpeg","little-nemo-19081115-l.jpeg","little-nemo-19081122-l.jpeg","little-nemo-19081129-l.jpeg","little-nemo-19081206-l.jpeg","little-nemo-19081213-l.jpeg","little-nemo-19081220-l.jpeg","little-nemo-19081227-l.jpeg"];

    let currentIndex = 0;
    const imgElement = document.getElementById('slide-display');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const currentCounter = document.getElementById('current-page');
    const totalCounter = document.getElementById('total-pages');

    if (files.length === 0) {
        document.body.innerHTML = "<div style='padding:20px; text-align:center;'>No image files found natively by the server.</div>";
    } else {
        totalCounter.textContent = files.length;
        showSlide(0);
    }

    function showSlide(index) {
        if (index >= 0 && index < files.length) {
            currentIndex = index;
            imgElement.src = "./" + files[currentIndex];
            currentCounter.textContent = currentIndex + 1;
        }
    }

    // Left button goes BACKWARDS
    leftBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            showSlide(currentIndex - 1);
        } else {
            showSlide(files.length - 1); 
        }
    });

    // Right button advances FORWARD
    rightBtn.addEventListener('click', () => {
        if (currentIndex < files.length - 1) {
            showSlide(currentIndex + 1);
        } else {
            showSlide(0); 
        }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") leftBtn.click();
        if (e.key === "ArrowRight") rightBtn.click();
    });
</script>

</body>
</html>
